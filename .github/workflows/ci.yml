name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lite:
    name: lite-tier (no model downloads)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (lite tier + dev tools only)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Test (lite tier, zero ML)
        run: pytest -q

  full:
    name: full-tier (torch + real detectors)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Hugging Face models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}

      - name: Install full + eval extras (CPU torch)
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[full,eval,dev]"
          python -m spacy download en_core_web_sm || true

      - name: Sanity — torch + detectors import and score
        run: |
          python - <<'PY'
          from humanize.detectors.base import load_detectors, resolved_tier
          dets = load_detectors("full")
          tier = resolved_tier(dets)
          names = sorted(d.name for d in dets)
          print("tier:", tier, "| detectors:", names)
          assert tier == "full", f"expected full tier, got {tier} ({names})"
          assert "roberta_openai" in names and "mage" in names, names
          PY

      - name: Test (full tier — runs the @full_tier marked tests too)
        env:
          HUMANIZE_RUN_FULL_TIER: "1"
        run: pytest -q
