name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lite:
    name: lite-tier (no model downloads)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (lite tier + dev tools; mcp is pure-python, no models)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,mcp]"

      - name: Lint
        run: ruff check .

      - name: Test (lite tier, zero ML)
        run: pytest -q

      - name: Console scripts wired (entry points resolve)
        run: |
          untell-score "Moreover, the system leverages synergies to facilitate outcomes." --threshold 0.30
          printf 'This sentence is plainly written. Another one here.\n' | untell-sentences
          untell-verify --help
          # untell-mcp/-loop/-prove/-distill launch servers/loops; just assert the entry points exist.
          command -v untell-loop untell-prove untell-mcp untell-distill

  full:
    name: full-tier (torch + real detectors)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Hugging Face models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}

      - name: Install full + eval extras (CPU torch)
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[full,eval,dev]"
          python -m spacy download en_core_web_sm || true

      - name: Sanity — torch + detectors import and score
        run: |
          python - <<'PY'
          from untell.detectors.base import load_detectors, resolved_tier
          dets = load_detectors("full")
          tier = resolved_tier(dets)
          names = sorted(d.name for d in dets)
          print("tier:", tier, "| detectors:", names)
          assert tier == "full", f"expected full tier, got {tier} ({names})"
          assert "roberta_openai" in names and "mage" in names, names
          PY

      - name: Test (full tier)
        run: pytest -q

  linux-install:
    name: linux installer + zero-dep run (install.sh)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Install from the checked-out copy via the POSIX installer (UNTELL_REPO), then run a script
      # zero-dep from an unrelated cwd. Mirrors windows-install for macOS/Linux parity.
      - name: Install the skill via install.sh
        env:
          UNTELL_REPO: ${{ github.workspace }}
          CLAUDE_SKILLS_DIR: ${{ runner.temp }}/claude-skills
        run: sh ./install.sh

      - name: Lite-tier score runs zero-dep from an unrelated cwd
        env:
          CLAUDE_SKILLS_DIR: ${{ runner.temp }}/claude-skills
        run: |
          set -e
          score="$CLAUDE_SKILLS_DIR/untell/scripts/score.py"
          test -f "$score" || { echo "skill not installed: $score missing"; exit 1; }
          cd /tmp  # prove it runs from an unrelated cwd, no PYTHONPATH
          python "$score" "Moreover, the framework leverages synergies to facilitate robust outcomes." --threshold 0.30 > out.json
          cat out.json
          python -c "import json; j=json.load(open('out.json')); assert j['tier']=='lite', j['tier']; assert j['max'] is not None; print('OK zero-dep lite score, max=', j['max'])"

  windows-install:
    name: windows installer + zero-dep run (Windows PowerShell 5.1)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # `shell: powershell` is Windows PowerShell 5.1 — the exact interpreter where the
      # installer used to abort (git's stderr -> terminating NativeCommandError). Installing
      # from the checked-out copy (UNTELL_REPO) regression-tests *this* commit's installer.
      - name: Install the skill via install.ps1 (Windows PowerShell 5.1)
        shell: powershell
        env:
          UNTELL_REPO: ${{ github.workspace }}
          CLAUDE_SKILLS_DIR: ${{ runner.temp }}\claude-skills
        run: .\install.ps1

      - name: Lite-tier score runs zero-dep from an unrelated cwd
        shell: powershell
        env:
          CLAUDE_SKILLS_DIR: ${{ runner.temp }}\claude-skills
        run: |
          # Relax EAP: GitHub's powershell preamble sets 'stop', which would turn score.py's
          # harmless stderr note into a terminating error. Gate on the real exit code instead.
          $ErrorActionPreference = "Continue"
          $score = Join-Path $env:CLAUDE_SKILLS_DIR "untell\scripts\score.py"
          if (-not (Test-Path $score)) { throw "skill not installed: $score is missing" }
          Set-Location $env:USERPROFILE   # prove it runs from an unrelated cwd, no PYTHONPATH
          $out = python $score "Moreover, the framework leverages synergies to facilitate robust, scalable outcomes." --threshold 0.30
          if ($LASTEXITCODE -ne 0) { throw "score.py failed (exit $LASTEXITCODE)" }
          Write-Host $out
          $json = $out | ConvertFrom-Json
          if ($json.tier -ne "lite") { throw "expected lite tier (zero-dep), got '$($json.tier)'" }
          if ($null -eq $json.max)   { throw "score output has no 'max' field" }
          Write-Host "OK: zero-dep lite score ran from $($PWD.Path) - tier=$($json.tier) max=$($json.max)"
